<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>微信订单管家</title>
<link rel="manifest" href="/wx-order/manifest.json">
<meta name="theme-color" content="#07c160">

<style>
:root {
  --primary: #07c160; --blue: #1677ff; --orange: #fa8c16;
  --bg: #f4f6f8; --card: #ffffff; --radius: 16px;
  --shadow: 0 10px 30px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  max-width: 540px; margin: 0 auto; padding: 12px; background: var(--bg);
}
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.stat-card { background: var(--card); border-radius: var(--radius); padding: 12px 8px; box-shadow: var(--shadow); text-align: center; }
.stat-title { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
.stat-num { font-size: 17px; font-weight: 700; word-break: break-all; }
.stat-order { color: var(--blue); } .stat-amount { color: var(--primary); }
.stat-wait { color: var(--orange); } .stat-paid { color: #52c41a; }
.stat-profit { color: #cf1322; } .stat-gross { color: #722ed1; }

.cost-setting { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px; }
.cost-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 14px; font-weight: 600; }
.cost-body { padding: 0 14px 14px; display: none; }
.cost-body.show { display: block; }
.cost-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.cost-form label { font-size: 11px; color: #666; display: block; margin-bottom: 3px; }
.cost-form input { width: 100%; padding: 9px 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; background: #f9fafb; }

.main-card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); margin-bottom: 14px; }
h2 { margin: 0 0 16px; font-size: 19px; font-weight: 600; text-align: center; }
label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #1f2937; }
input, textarea, select {
  width: 100%; padding: 11px 12px; border: 1px solid #e5e7eb;
  border-radius: 10px; font-size: 15px; background: #f9fafb;
}
textarea { min-height: 42px; resize: vertical; }

.cost3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.cost3 label { font-size: 11px; color: #666; margin-bottom: 3px; display: block; }
.cost3 input { padding: 9px 10px; font-size: 13px; }

.btn { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; color: #fff; background: linear-gradient(135deg, #06d160, #0aab5a); margin-top: 6px; cursor: pointer; }
.btn:active { transform: scale(0.98); }

.action-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 16px; }
.btna { padding: 9px 6px; font-size: 12px; border-radius: 10px; font-weight: 500; border: none; cursor: pointer; }
.btna-b { background: #eef4ff; color: var(--blue); }
.btna-o { background: #fff7e6; color: var(--orange); }
.btna-g { background: #f5f5f5; color: #666; }

.preview h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #6b7280; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #f9fafb; color: #999; font-weight: 500; padding: 7px 6px; text-align: left; }
td { padding: 7px 6px; border-top: 1px solid #f0f0f0; }
.status-tag { padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.status-wait { background: #fff7e6; color: #d46b08; }
.status-paid { background: #f6ffed; color: #389e0d; }
.p-pos { color: #389e0d; } .p-neg{ color: #cf1322; } .p-zero{ color: #999; }
.src { color: var(--blue); text-decoration: underline; font-size: 11px; }

.tip { text-align: center; font-size: 11px; color: #bbb; margin-top: 12px; }
.warn { color: #fa8c16; font-size: 12px; text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<!-- 统计 -->
<div class="stats-grid">
  <div class="stat-card"><div class="stat-title">📦 订单</div><div class="stat-num stat-order" id="tc">0</div></div>
  <div class="stat-card"><div class="stat-title">💰 销售额</div><div class="stat-num stat-amount" id="ta">¥0.00</div></div>
  <div class="stat-card"><div class="stat-title">⏳ 待收款</div><div class="stat-num stat-wait" id="tw">¥0.00</div></div>
  <div class="stat-card"><div class="stat-title">✅ 已收款</div><div class="stat-num stat-paid" id="tp">¥0.00</div></div>
  <div class="stat-card"><div class="stat-title">💸 纯利</div><div class="stat-num stat-profit" id="tpr">¥0.00</div></div>
  <div class="stat-card"><div class="stat-title">📈 毛利</div><div class="stat-num stat-gross" id="tg">0.00%</div></div>
</div>

<!-- 默认成本设置 -->
<div class="cost-setting">
  <div class="cost-header" onclick="toggleCost()">
    ⚙️ 默认成本设置
    <span id="costArr" style="font-size:12px;color:#999">▼</span>
  </div>
  <div class="cost-body" id="costBody">
    <div class="cost-form">
      <div><label>默认采购(元)</label><input id="defPur" type="number" step="0.01" placeholder="0.00"></div>
      <div><label>默认快递(元)</label><input id="defExp" type="number" step="0.01" placeholder="0.00"></div>
      <div><label>默认包装(元)</label><input id="defPak" type="number" step="0.01" placeholder="0.00"></div>
    </div>
    <button class="btna btna-b" style="margin-top:10px;width:100%" onclick="saveDef()">保存默认成本</button>
  </div>
</div>

<!-- 新建订单 -->
<div class="main-card">
  <h2>🛒 新建订单</h2>
  <div style="margin-bottom:12px"><label>客户微信名</label><input id="c" placeholder="必填"></div>
  <div style="margin-bottom:12px"><label>1688货源链接</label><input id="src1688" placeholder="https://detail.1688.com/..."></div>
  
  <div style="margin-bottom:12px">
    <label>收货地址（粘贴整段自动识别电话）</label>
    <div style="display:flex;gap:8px;align-items:stretch">
      <textarea id="addr" rows="2" style="flex:1" placeholder="例：浙江省杭州市...张先生150****1234"
        onpaste="setTimeout(smartPaste,0)"></textarea>
      <div style="display:flex;flex-direction:column;justify-content:center">
        <button type="button" onclick="smartPaste()" style="padding:6px 9px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:11px;font-weight:600;cursor:pointer">📋识别</button>
      </div>
    </div>
  </div>

  <div style="margin-bottom:12px"><label>联系电话</label><input id="tel" inputmode="numeric"></div>
  <div style="margin-bottom:12px"><label>商品名称</label><input id="p" placeholder="必填"></div>

  <div class="cost3">
    <div><label>采购成本</label><input id="pur" type="number" step="0.01" placeholder="不填用默认"></div>
    <div><label>快递成本</label><input id="exp" type="number" step="0.01" placeholder="不填用默认"></div>
    <div><label>包装成本</label><input id="pak" type="number" step="0.01" placeholder="不填用默认"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div><label>单价(元)</label><input id="pr" type="number" step="0.01" placeholder="0.00"></div>
    <div><label>数量</label><input id="q" type="number" value="1" min="1"></div>
  </div>

  <div style="margin-bottom:12px"><label>备注</label><input id="memo" placeholder="颜色/尺寸/要求"></div>
  <div style="margin-bottom:4px">
    <label>收款状态</label>
    <select id="paid" style="width:auto;min-width:120px">
      <option value="待收款">⏳ 待收款</option>
      <option value="已收款">✅ 已收款</option>
    </select>
  </div>

  <button class="btn" onclick="go()">📋 提交订单</button>
  <p class="warn">⚠️ 微信内打开可能无法下载，请点右上角「在浏览器中打开」</p>

  <div class="action-bar">
    <button class="btna btna-b" onclick="dlCSV()">📥 导出CSV</button>
    <button class="btna btna-o" onclick="dlJSON()">💾 备份</button>
    <button class="btna btna-g" onclick="clr()">🗑 清空</button>
  </div>
</div>

<div class="main-card preview">
  <h3>📃 最近订单</h3>
  <div id="pv"></div>
  <p class="tip">数据仅在本机，导出/备份到电脑最稳</p>
</div>

<script>
/* ========= 基础配置 ========= */
const K = 'wechatOrders', CK = 'orderDefCost';
let defCost = { pur:0, exp:0, pak:0 };

/* ========= 默认成本 ========= */
function loadDef(){
  try {
    const j = localStorage.getItem(CK);
    if(j) defCost = JSON.parse(j);
    _ph();
  } catch(e){}
}
function saveDef(){
  defCost = {
    pur: parseFloat(defPur.value)||0,
    exp: parseFloat(defExp.value)||0,
    pak: parseFloat(defPak.value)||0
  };
  localStorage.setItem(CK, JSON.stringify(defCost));
  _ph();
  alert('✅ 默认成本已保存');
}
function _ph(){
  try{
    pur.placeholder = `不填则用 ¥${defCost.pur.toFixed(2)}`;
    exp.placeholder = `不填则用 ¥${defCost.exp.toFixed(2)}`;
    pak.placeholder = `不填则用 ¥${defCost.pak.toFixed(2)}`;
  }catch(e){}
}

/* ========= 安全读写 ========= */
function RD(){ try{ return JSON.parse(localStorage.getItem(K)||'[]'); }catch(e){ return []; } }
function WR(arr){ try{ localStorage.setItem(K, JSON.stringify(arr)); }catch(e){ alert('存储失败，可能空间不足'); } }

/* ========= 智能粘贴 ========= */
function _parseAddr(s){
  if(!s) return {ph:'',addr:s};
  s = s.replace(/[\r\n]/g,' ').replace(/　/g,' ').replace(/地址[：:\s]*/i,'').trim();
  const m = s.match(/(1[3-9]\d{9})/);
  let ph = '';
  if(m){ ph = m[1]; s = s.replace(ph,''); }
  s = s.replace(/^[，,：:、\s]+/,'').replace(/[，,：:、\s]+$/,'')
       .replace(/\s{2,}/g,' ').trim();
  return {ph,addr:s};
}
function smartPaste(){
  try{
    const r = _parseAddr(addr.value);
    if(r.ph) tel.value = r.ph;
    addr.value = r.addr;
  }catch(e){}
}

/* ========= 统计（兼容旧数据）========= */
function cnt(){
  try{
    const d = new Date();
    const ts = `${d.getFullYear()}/${(d.getMonth()+1)}/${d.getDate()}`;
    const A = RD();
    let n=0,a=0,w=0,p=0,prf=0;
    A.forEach(o=>{
      if(o.createTime && o.createTime.startsWith(ts)){
        n++;
        const amt = parseFloat(o.totalAmount||0);
        a += amt;
        if(o.status==='待收款') w += amt;
        if(o.status==='已收款') p += amt;
        prf += (o.profit??0);
      }
    });
    tc.textContent = n;
    ta.textContent = `¥${a.toFixed(2)}`;
    tw.textContent = `¥${w.toFixed(2)}`;
    tp.textContent = `¥${p.toFixed(2)}`;
    tpr.textContent = `¥${prf.toFixed(2)}`;
    tg.textContent = a>0 ? `${(prf/a*100).toFixed(2)}%` : '0.00%';
  }catch(e){}
}

/* ========= 提交订单（同步逻辑，100%稳）========= */
function go(){
  try{
    const cV = c.value.trim(), pV = p.value.trim(), prV = parseFloat(pr.value);
    if(!cV){ alert('客户微信名必填'); c.focus(); return; }
    if(!pV){ alert('商品名称必填'); p.focus(); return; }
    if(!prV||prV<=0){ alert('单价必填且>0'); pr.focus(); return; }

    // 成本处理：手动输入优先，否则用默认
    const purV = expVal(pur.value, defCost.pur);
    const expV = expVal(exp.value, defCost.exp);
    const pakV = expVal(pak.value, defCost.pak);
    const qty = parseInt(q.value)||1;
    const total = prV * qty;
    const cost = purV + expV + pakV;
    const profit = total - cost;

    const o = {
      orderNumber: 'WX'+Date.now()+Math.floor(Math.random()*1000),
      customerName: cV,
      address: (addr.value||'').trim(),
      tel: (tel.value||'').trim(),
      src1688: (src1688.value||'').trim(),
      productName: pV,
      price: prV,
      quantity: qty,
      purchase: +purV.toFixed(2),
      express: +expV.toFixed(2),
      pack: +pakV.toFixed(2),
      totalCost: +cost.toFixed(2),
      totalAmount: +total.toFixed(2),
      profit: +profit.toFixed(2),
      memo: (memo.value||'').trim(),
      status: paid.value,
      createTime: new Date().toLocaleString('zh-CN')
    };

    const A = RD();
    A.push(o);
    WR(A);

    // 更新界面
    cnt();
    pvw();

    // 清空表单
    c.value = p.value = pr.value = '';
    q.value = '1';
    addr.value = tel.value = src1688.value = memo.value = '';
    pur.value = exp.value = pak.value = '';
    paid.value = '待收款';

    if(navigator.vibrate) navigator.vibrate(50);
    alert(`✅ 提交成功\n纯利润：¥${profit.toFixed(2)}`);
  }catch(e){ alert('提交失败：'+e.message); }
}
function expVal(raw, fb){ return raw.trim()!=='' ? (parseFloat(raw)||0) : fb; }

/* ========= 预览（兼容旧数据）========= */
function pvw(){
  try{
    const A = RD();
    const el = pv;
    if(!A.length){ el.innerHTML='<div style="color:#bbb;text-align:center;font-size:13px;padding:8px 0">暂无订单</div>'; return; }
    let h='<table><tr><th>单号</th><th>客户</th><th>纯利</th><th>状态</th><th>货源</th></tr>';
    A.slice(-6).reverse().forEach(o=>{
      const pf = (o.profit??0);
      const pc = pf>0?'p-pos':pf<0?'p-neg':'p-zero';
      const link = o.src1688 ? `<a href="${o.src1688}" target="_blank" rel="noopener" class="src">1688 ↗</a>` : '<span style="color:#ccc">-</span>';
      h+=`<tr>
        <td>${o.orderNumber.slice(-6)}</td>
        <td>${o.customerName||'-'}</td>
        <td class="${pc}">¥${pf.toFixed(2)}</td>
        <td><span class="status-tag ${(o.status==='已收款')?'status-paid':'status-wait'}">${o.status||'待收款'}</span></td>
        <td>${link}</td>
      </tr>`;
    });
    h+='</table>';
    el.innerHTML=h;
  }catch(e){ pv.innerHTML='<div style="color:#bbb;text-align:center;font-size:13px;padding:8px 0">暂无订单</div>'; }
}

/* ========= 安卓专属同步下载（核心修复点）========= */
function dlCSV(){
  try{
    const A = RD();
    if(!A.length){ alert('暂无订单'); return; }
    // 生成CSV（带BOM头，WPS打开不乱码）
    let csv = '\uFEFF单号,客户微信,联系电话,收货地址,商品名称,1688货源,采购成本(元),快递成本(元),包装成本(元),总成本(元),单价(元),数量,总额(元),纯利润(元),毛利(%),备注,收款状态,下单时间\n';
    A.forEach(o=>{
      const amt = (o.totalAmount||0);
      const prf = (o.profit??0);
      const gr = amt>0 ? (prf/amt*100).toFixed(2)+'%' : '0.00%';
      csv += [
        o.orderNumber||'', o.customerName||'', o.tel||'', o.address||'', o.productName||'',
        o.src1688||'', (o.purchase??0), (o.express??0), (o.pack??0), (o.totalCost??0),
        o.price||'', o.quantity||'', amt, prf.toFixed(2), gr,
        o.memo||'', o.status||'', o.createTime||''
      ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')+'\n';
    });
    // 同步生成下载链接，100%不会被安卓拦截
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `微信订单_${new Date().toISOString().slice(0,10)}.csv`;
    // 同步触发点击，无异步操作
    a.click();
    // 延迟释放URL，确保下载完成
    setTimeout(()=>URL.revokeObjectURL(url), 100);
  }catch(e){ alert('导出CSV失败：'+e.message); }
}

function dlJSON(){
  try{
    const A = RD();
    if(!A.length){ alert('暂无订单'); return; }
    const blob = new Blob([JSON.stringify(A,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `订单备份_${Date.now()}.json`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 100);
  }catch(e){ alert('备份失败：'+e.message); }
}

/* ========= 清空 ========= */
function clr(){
  if(!confirm('清空订单？（默认成本不会被清）')) return;
  localStorage.removeItem(K);
  cnt();
  pvw();
  alert('✅ 已清空');
}

/* ========= UI控制 ========= */
function toggleCost(){
  const b = costBody, ar = costArr;
  b.classList.toggle('show');
  ar.textContent = b.classList.contains('show')?'▲':'▼';
  if(b.classList.contains('show')){
    defPur.value = defCost.pur;
    defExp.value = defCost.exp;
    defPak.value = defCost.pak;
  }
}

/* ========= 初始化 ========= */
loadDef();
cnt();
pvw();
</script>
</body>
</html>
