<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>微信订单管家</title>

<link rel="manifest" href="/wx-order/manifest.json">
<meta name="theme-color" content="#07c160">

<style>
:root {
  --primary: #07c160; --bg: #f4f6f8; --card: #ffffff;
  --text-main: #1f2937; --radius: 16px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  max-width: 540px; margin: 0 auto; padding: 12px; background: var(--bg);
}
.main-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); margin-bottom: 16px; }
h2 { margin: 0 0 20px; font-size: 20px; font-weight: 600; text-align: center; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
input, textarea, select {
  width: 100%; padding: 12px 14px; border: 1px solid #e5e7eb;
  border-radius: 10px; font-size: 15px; background: #f9fafb;
}
textarea { min-height: 44px; resize: vertical; }
.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 600; color: #fff;
  background: linear-gradient(135deg, #06d160, #0aab5a); margin-top: 8px;
}
.btn:active { transform: scale(0.98); }
.tip { text-align: center; font-size: 11px; color: #bbb; margin-top: 16px; }
</style>
</head>
<body>

<div class="main-card">
  <h2>🛒 新建订单</h2>

  <div class="form-group"><label>客户微信名</label><input id="c" placeholder="必填"/></div>

  <div class="form-group">
    <label>收货地址</label>
    <textarea id="addr" rows="2" placeholder="粘贴整段自动识别电话"
      onpaste="setTimeout(doSmartPaste,0)"></textarea>
  </div>

  <div class="form-group"><label>联系电话</label><input id="tel" inputmode="numeric"/></div>
  <div class="form-group"><label>商品名称</label><input id="p" placeholder="必填"/></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="form-group"><label>单价</label><input id="pr" type="number" step="0.01"/></div>
    <div class="form-group"><label>数量</label><input id="q" type="number" value="1"/></div>
  </div>

  <div class="form-group"><label>备注</label><input id="memo"/></div>

  <div class="form-group">
    <label>收款状态</label>
    <select id="paid">
      <option value="待收款">待收款</option>
      <option value="已收款">已收款</option>
    </select>
  </div>

  <button class="btn" onclick="go()">📋 提交订单</button>
  <p class="tip">数据仅保存在本机，导出后建议备份</p>
</div>

<script>
const KEY = 'wechatOrders';

function safeLoad(){ try { return JSON.parse(localStorage.getItem(KEY)||'[]'); } catch(e){ return []; } }
function safeSave(arr){ try { localStorage.setItem(KEY, JSON.stringify(arr)); } catch(e){ alert('存储失败，可能空间不足'); } }

/* 智能粘贴 */
function parseAddressText(raw){
  if(!raw) return {phone:'',restAddress:raw};
  let s = raw.replace(/[\r\n]/g,' ').replace(/　/g,' ').trim();
  let phone = '';
  const m = s.match(/(1[3-9]\d{9})/);
  if(m){ phone = m[1]; s = s.replace(phone,''); }
  return { phone: phone, restAddress: s.replace(/\s+/g,' ').trim() };
}
function doSmartPaste(){
  const addrEl = document.getElementById('addr');
  const telEl = document.getElementById('tel');
  const r = parseAddressText(addrEl.value);
  if(r.phone) telEl.value = r.phone;
  addrEl.value = r.restAddress;
}

/* 提交订单（最简、最稳） */
function go(){
  try {
    const c = document.getElementById('c').value.trim();
    const p = document.getElementById('p').value.trim();
    const pr = parseFloat(document.getElementById('pr').value);

    if(!c){ alert('请填写客户微信名'); return; }
    if(!p){ alert('请填写商品名称'); return; }
    if(!pr || pr<=0){ alert('请填写正确的单价'); return; }

    const o = {
      orderNumber: 'WX' + Date.now(),
      customerName: c,
      address: document.getElementById('addr').value.trim(),
      tel: document.getElementById('tel').value.trim(),
      productName: p,
      price: pr,
      quantity: parseInt(document.getElementById('q').value)||1,
      memo: document.getElementById('memo').value.trim(),
      totalAmount: (pr * (parseInt(document.getElementById('q').value)||1)).toFixed(2),
      createTime: new Date().toLocaleString('zh-CN'),
      status: document.getElementById('paid').value
    };

    const arr = safeLoad();
    arr.push(o);
    safeSave(arr);

    alert('✅ 订单提交成功');

    // 清空
    document.getElementById('c').value = '';
    document.getElementById('p').value = '';
    document.getElementById('pr').value = '';
    document.getElementById('q').value = '1';
    document.getElementById('addr').value = '';
    document.getElementById('tel').value = '';
    document.getElementById('memo').value = '';
    document.getElementById('paid').value = '待收款';

  } catch(e) {
    alert('提交失败：' + e.message);
  }
}
</script>
</body>
</html>
