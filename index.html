<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>微信订单创建</title>
<style>
body{font-family:'PingFang SC',Arial,sans-serif;max-width:520px;margin:24px auto;padding:0 14px;background:#f4f6f8}
.card{background:#fff;border-radius:14px;padding:22px 20px;box-shadow:0 4px 20px #0001}
h2{text-align:center;color:#07c160;margin:0 0 18px}
.f{margin-bottom:14px}
label{font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:4px}
input{width:100%;padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box;background:#fafafa}
input:focus{border-color:#07c160;outline:none;background:#fff}
button{width:100%;background:#07c160;color:#fff;border:none;padding:12px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
button:active{opacity:.85}
#msg{display:none;margin-top:16px;padding:14px 16px;background:#e8f5e9;border-radius:10px;font-size:14px;line-height:1.7}
#msg .oh{font-weight:700;color:#07c160;font-size:15px;word-break:break-all}
.copy-btn{margin-top:10px;background:#1890ff!important;padding:8px 16px!important;font-size:13px!important;width:auto!important;border-radius:8px}
.tip{color:#999;font-size:12px;margin-top:12px}
</style>
</head>
<body>
<div class="card">
<h2>🛒 微信订单创建</h2>

<div class="f"><label>客户微信名</label><input id="c" placeholder="例：小明"></div>
<div class="f"><label>商品名称</label><input id="p" placeholder="例：黑色皮夹"></div>
<div class="f"><label>单价（元）</label><input id="pr" type="number" step="0.01" placeholder="0.00"></div>
<div class="f"><label>数量</label><input id="q" type="number" value="1" min="1"></div>

<button onclick="go()">📋 生成订单 / 存到云端</button>

<div id="msg">
  <div class="tip">✅ 已存到云端（GitHub Issues）</div>
  <div style="margin:8px 0"><b>订单号：</b><span class="oh" id="on"></span></div>
  <div><b>客户：</b><span id="dc"></span></div>
  <div><b>商品：</b><span id="dp"></span></div>
  <div><b>金额：</b>¥<span id="da"></span></div>
  <div><b>时间：</b><span id="dt"></span></div>
  <button class="copy-btn" onclick="cpy()">📎 复制订单号</button>
</div>
</div>

<script src="config.js"></script>
<script>
async function saveToGitHub(order){
  const url=`https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues`;
  const bodyText=[
    `- 客户：${order.customerName}`,
    `- 商品：${order.productName} × ${order.quantity}`,
    `- 单价：¥${order.price}`,
    `- 金额：¥${order.totalAmount}`,
    `- 时间：${order.createTime}`,
    ``,
    `状态：待付款`
  ].join('\n');

  const res=await fetch(url,{
    method:'POST',
    headers:{
      'Authorization':`token ${CONFIG.GITHUB_TOKEN}`,
      'Accept':'application/vnd.github.v3+json',
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      title:`[订单] ${order.orderNumber}`,
      body:bodyText,
      labels:['order']
    })
  });
  if(!res.ok) throw new Error('GitHub 写入失败（'+res.status+'）');
}

function genOrderNum(){
  const d=new Date();
  const y=String(d.getFullYear()).slice(-2);
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const t=String(d.getTime()).slice(-6);
  const r=String(Math.floor(Math.random()*1000)).padStart(3,'0');
  return `WX${y}${m}${dd}${t}${r}`;
}

async function go(){
  const cEl=document.getElementById('c'),pEl=document.getElementById('p'),
        prEl=document.getElementById('pr'),qEl=document.getElementById('q');
  const c=cEl.value.trim(),p=pEl.value.trim(),
        pr=parseFloat(prEl.value),q=parseInt(qEl.value)||1;
  if(!c||!p||!pr){alert('信息填完整哈～');return;}

  const order={
    orderNumber:genOrderNum(),
    customerName:c,productName:p,
    price:pr,quantity:q,
    totalAmount:(pr*q).toFixed(2),
    createTime:new Date().toLocaleString('zh-CN'),
    status:'待付款'
  };

  try{
    await saveToGitHub(order);
    on.textContent=order.orderNumber;
    dc.textContent=c;dp.textContent=p+' × '+q;
    da.textContent=order.totalAmount;dt.textContent=order.createTime;
    msg.style.display='block';msg.scrollIntoView({behavior:'smooth'});
  }catch(e){
    alert('⚠️ 存云端失败：\n'+e.message+'\n\n检查：1)Token是否正确 2)config.js是否已提交');
  }
}

function cpy(){
  navigator.clipboard.writeText(on.textContent).then(()=>alert('✅ 已复制'));
}
</script>
</body>
</html>
